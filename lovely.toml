[manifest]
version = "1.0.0"
dump_lua = true
priority = 0


# Elite Stake positioning (because Nacho is selfish and likes the pretty gold star)
[[patches]]
[patches.pattern]
target = '=[SMODS Pokermon "stakes/stakes.lua"]'
pattern = '''
applied_stakes = {'gold'},
above_stake = 'gold',
'''
position = 'at'
match_indent = true
payload = '''
applied_stakes = {'sonfive_lilac_stake'},
above_stake = 'sonfive_lilac_stake',
'''


# Pearlescent Deck functionality
[[patches]]
[patches.pattern]
target = "functions/common_events.lua"
pattern = "if card.ability.consumeable and not skip_materialize then card:start_materialize() end"
position = "after"
payload = '''
if _type == 'Joker' and G.GAME.modifiers.pearlescent then 
    increment_energy(card, get_type(card), -1, true)
    card.ability.extra.e_limit_up = card.ability.extra.e_limit_up and (card.ability.extra.e_limit_up - 1) or -1
end
'''
match_indent = true